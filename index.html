    /* ════════════════════════════════════════
       用水趋势柱状图（SVG）
    ════════════════════════════════════════ */
    const UsageTrendChart = ({ data, days }) => {
      const max = Math.max(...data, 0.1);
      const barW = 28, gap = 8, chartH = 72;
      const chartW = data.length * barW + (data.length - 1) * gap;
      return (
        <svg width="100%" viewBox={`0 0 ${chartW + 20} ${chartH + 38}`} preserveAspectRatio="xMidYMid meet">
          {data.map((v, i) => {
            const bh = Math.max((v / max) * chartH, v > 0 ? 4 : 0);
            const x = 10 + i * (barW + gap);
            const y = chartH - bh;
            const isLast = i === data.length - 1;
            return (
              <g key={i}>
                <rect x={x} y={y} width={barW} height={bh} rx="5"
                  fill={isLast ? '#3b82f6' : '#bfdbfe'} />
                {v > 0 && (
                  <text x={x + barW / 2} y={y - 5} textAnchor="middle" fontSize="9"
                    fill={isLast ? '#3b82f6' : '#93c5fd'}>{v}</text>
                )}
                <text x={x + barW / 2} y={chartH + 18} textAnchor="middle" fontSize="9" fill="#9ca3af">
                  {days[i]}
                </text>
              </g>
            );
          })}
          {/* 基准线 */}
          <line x1="10" x2={chartW + 10} y1={chartH} y2={chartH} stroke="#f3f4f6" strokeWidth="1" />
        </svg>
      );
    };

                    <div>
                      <span className={`text-sm font-semibold ${p.enabled ? 'text-gray-800' : 'text-gray-400'}`}>{p.label}</span>

                    </div>

          );
        }
        if (route.page === '用户服务') {
          return (
            <UserServicePage
              onBack={() => nav('home')}
              onUserClick={user => setRoute({ page: 'userDetail', user })}
            />
          );
        }
        if (route.page === 'userDetail') {
          return (
            <UserDetailPage
              user={route.user}
              onBack={() => nav('用户服务')}
            />
          );
        }
        if (route.page === '报警管理') {
          return (
            <AlarmManagePage
              onBack={() => nav('home')}
              alarmEvents={alarmEvents}
              onUpdate={setAlarmEvents}
            />
          );
        }
        if (route.page === '我的') {
          return <MyPage />;
        }
        if (route.page === '巡检管理') {
          return <InspectManagePage onBack={() => nav('home')} />;
        }
        if (route.page === '维保管理') {
          return <MaintManagePage onBack={() => nav('home')} />;
        }
        return <PlaceholderPage title={route.page} onBack={() => nav('home')} />;
      };

      return (
        <div className="relative min-h-screen flex flex-col">
          <div style={{ paddingBottom: showNav ? '64px' : 0 }}>
            {renderContent()}
          </div>
          {showNav && <BottomNav current={route.page} onNavigate={nav} />}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <div className="max-w-sm mx-auto min-h-screen shadow-xl">
        <App />
      </div>
    );
  </script>
</body>
</html>
